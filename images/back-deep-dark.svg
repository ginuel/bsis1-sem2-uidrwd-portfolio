<svg width="64" height="64" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Base Deepslate (Dark Grey/Blue) -->
  <rect width="16" height="16" fill="#0d1416" />
  
  <!-- Stone Texture highlights -->
  <rect x="0" y="2" width="2" height="2" fill="#1a2328" />
  <rect x="8" y="10" width="3" height="1" fill="#1a2328" />
  <rect x="13" y="4" width="2" height="2" fill="#131b1f" />
  
  <!-- Sculk Growths (Deep Teal) -->
  <rect x="2" y="3" width="4" height="4" fill="#062c33" />
  <rect x="10" y="11" width="5" height="3" fill="#062c33" />
