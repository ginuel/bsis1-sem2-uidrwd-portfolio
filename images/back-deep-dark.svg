  <!-- Bioluminescent "Soul" Dots (Cyan) -->
  <rect x="3" y="4" width="1" height="1" fill="#11fbff" />
  <rect x="5" y="5" width="1" height="1" fill="#009295" />
  <rect x="13" y="12" width="1" height="1" fill="#11fbff" />
