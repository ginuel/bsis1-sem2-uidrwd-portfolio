<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow (Diamond Sword) -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
    
    <!-- Sky Gradient for Desert Vibes -->
    <linearGradient id="desertSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" />
      <stop offset="100%" stop-color="#BAE1FF" />
    </linearGradient>
  </defs>

  <!-- 1. CACTUS (Replaces Oak Tree) -->
  <g transform="translate(-65, 0)">
    <!-- Main Stem -->
    <rect x="130" y="140" width="30" height="140" fill="#4B822C" />
    <!-- Left Arm -->
    <rect x="110" y="180" width="20" height="40" fill="#4B822C" />
    <rect x="110" y="170" width="20" height="10" fill="#4B822C" />
    <!-- Right Arm -->
    <rect x="160" y="160" width="20" height="50" fill="#4B822C" />
    <rect x="160" y="150" width="20" height="10" fill="#4B822C" />
    
    <!-- Cactus Spikes (Details) -->
    <rect x="135" y="150" width="2" height="2" fill="#E0E0E0" />
    <rect x="150" y="170" width="2" height="2" fill="#E0E0E0" />
    <rect x="140" y="210" width="2" height="2" fill="#E0E0E0" />
    <rect x="115" y="185" width="2" height="2" fill="#E0E0E0" />
    <rect x="170" y="165" width="2" height="2" fill="#E0E0E0" />
    
    <!-- Dark Creases/Texture -->
    <rect x="138" y="140" width="4" height="140" fill="#3D6B25" opacity="0.3" />
  </g>

  <!-- 2. THE BIG STONE (Back Layer) -->
  <rect x="230" y="230" width="90" height="50" fill="#696969" /> 
  <rect x="215" y="260" width="15" height="20" fill="#5A5A5A" />

  <!-- 3. THE DIAMOND SWORD -->
  <g transform="translate(275, 210) rotate(180)">
    <rect x="0" y="0" width="6" height="12" fill="#5C4033" /> 
    <rect x="-6" y="-4" width="18" height="6" fill="#724924" /> 
    <rect x="0" y="-40" width="6" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="1" /> 
  </g>

  <!-- 4. THE BIG STONE (Front Layer) -->
  <rect x="245" y="235" width="60" height="45" fill="#808080" /> 
  <rect x="290" y="220" width="25" height="15" fill="#808080" /> 
  <rect x="305" y="250" width="20" height="30" fill="#808080" />

  <!-- 5. SAND CRUST (Desert Palette) -->
  <rect x="0" y="280" width="400" height="20" fill="#F4D03F" /> <!-- Sand Top -->
  <rect x="0" y="300" width="400" height="60" fill="#D4AC0D" /> <!-- Sand Depth -->
  
  <!-- Sand Jitters -->
  <rect x="40" y="310" width="3" height="3" fill="#B7950B" />
  <rect x="280" y="340" width="3" height="3" fill="#9A7D0A" />

  <!-- SAND SURFACE JITTERS -->
  <g class="crust-jitters">
    <rect x="30" y="280" width="10" height="4" fill="#D4AC0D" />
    <rect x="120" y="280" width="15" height="2" fill="#D4AC0D" />
    <rect x="250" y="280" width="8" height="5" fill="#D4AC0D" />
    <rect x="70" y="280" width="6" height="3" fill="#FCF3CF" />
    <rect x="190" y="280" width="10" height="2" fill="#FCF3CF" />
  </g>

  <!-- STONE CRUST JITTERS -->
  <g class="stone-surface-jitters">
    <rect x="255" y="245" width="4" height="4" fill="#696969" />
    <rect x="280" y="265" width="10" height="2" fill="#696969" />
    <rect x="295" y="230" width="3" height="3" fill="#A9A9A9" />
    <rect x="230" y="278" width="12" height="4" fill="#B7950B" />
  </g>

  <!-- DEAD BUSH (Replaces Poppy) -->
  <g class="dead-bush" transform="translate(45, 260)">
    <rect x="2" y="14" width="2" height="6" fill="#724924" />
    <rect x="0" y="10" width="6" height="4" fill="#724924" />
    <rect x="-2" y="6" width="2" height="4" fill="#724924" />
    <rect x="8" y="6" width="2" height="4" fill="#724924" />
  </g>

  <!-- DEAD BUSH (Replaces Dandelion) -->
  <g class="dead-bush" transform="translate(180, 270)">
    <rect x="3" y="6" width="2" height="4" fill="#724924" />
    <rect x="0" y="2" width="8" height="4" fill="#724924" opacity="0.8" />
  </g>

  <!-- WELL/STRUCTURE PIECE (Replaces Blue Orchid) -->
  <g class="sandstone-block" transform="translate(320, 262)">
    <rect x="0" y="8" width="14" height="10" fill="#F4D03F" />
    <rect x="0" y="6" width="14" height="2" fill="#D4AC0D" />
    <rect x="2" y="10" width="4" height="2" fill="#B7950B" opacity="0.5" />
  </g>

</svg>

