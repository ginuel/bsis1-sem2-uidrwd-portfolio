<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
  </defs>

  <!-- 1. HUGE RED MUSHROOM (Replaces Oak Tree) -->
  <g transform="translate(-65, 0)">
    <!-- Mushroom Stem -->
    <rect x="135" y="160" width="20" height="120" fill="var(--shroom-stem, #D1C4AC)" />
    <!-- Huge Red Cap Bottom Layer -->
    <rect x="85" y="120" width="120" height="40" fill="var(--shroom-red, #B11010)" /> 
    <!-- Cap Middle Layer -->
    <rect x="95" y="90" width="100" height="30" fill="var(--shroom-red, #B11010)" /> 
    <!-- Cap Top Layer -->
    <rect x="120" y="75" width="50" height="15" fill="var(--shroom-red, #B11010)" />
    
    <!-- White Spots (Mushroom Texture) -->
    <rect x="100" y="130" width="10" height="10" fill="#FFFFFF" />
    <rect x="170" y="100" width="10" height="10" fill="#FFFFFF" />
    <rect x="135" y="80" width="8" height="8" fill="#FFFFFF" />
  </g>

  <!-- 2. THE BIG STONE (Back Layer) -->
  <rect x="230" y="230" width="90" height="50" fill="#696969" /> 
  <rect x="215" y="260" width="15" height="20" fill="#5A5A5A" />

  <!-- 3. THE DIAMOND SWORD (Glow Applied) -->
  <g transform="translate(275, 210) rotate(180)">
    <rect x="0" y="0" width="6" height="12" fill="#5C4033" /> 
    <rect x="-6" y="-4" width="18" height="6" fill="#724924" /> 
    <!-- The Blade now uses the bladeGlow gradient -->
    <rect x="0" y="-40" width="6" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="1" /> 
  </g>

  <!-- 4. THE BIG STONE (Front Layer) -->
  <rect x="245" y="235" width="60" height="45" fill="#808080" /> 
  <rect x="290" y="220" width="25" height="15" fill="#808080" /> 
  <rect x="305" y="250" width="20" height="30" fill="#808080" />

  <!-- 5. MYCELIUM CRUST (Replaces Grass/Dirt) -->
  <rect x="0" y="280" width="400" height="20" fill="var(--mycelium-main, #6A5D6A)" /> 
  <rect x="0" y="300" width="400" height="60" fill="var(--dirt-main, #8B5A2B)" /> 
  
  <!-- Soil Jitters (Direct) -->
  <rect x="40" y="310" width="3" height="3" fill="var(--dirt-jitter-dark, #50351A)" />
  <rect x="280" y="340" width="3" height="3" fill="var(--dirt-jitter-mid, #724924)" />

  <!-- MYCELIUM CRUST JITTERS (Purple/Grey tones) -->
  <g class="crust-jitters">
    <rect x="30" y="280" width="10" height="4" fill="var(--mycelium-jitter-dark, #5A4D5A)" />
    <rect x="120" y="280" width="15" height="2" fill="var(--mycelium-jitter-dark, #5A4D5A)" />
    <rect x="250" y="280" width="8" height="5" fill="var(--mycelium-jitter-dark, #5A4D5A)" />
    <rect x="360" y="280" width="12" height="3" fill="var(--mycelium-jitter-dark, #5A4D5A)" />
    
    <!-- Spore Particles/Highlights -->
    <rect x="70" y="280" width="6" height="3" fill="var(--mycelium-jitter-light, #8E7D8E)" />
    <rect x="190" y="280" width="10" height="2" fill="var(--mycelium-jitter-light, #8E7D8E)" />
    <rect x="310" y="280" width="4" height="4" fill="var(--mycelium-jitter-light, #8E7D8E)" />
  </g>

  <!-- DIRT CRUST JITTERS -->
  <g class="soil-jitters">
    <rect x="60" y="320" width="4" height="4" fill="var(--dirt-jitter-dark, #50351A)" />
    <rect x="140" y="340" width="6" height="3" fill="var(--dirt-jitter-dark, #50351A)" />
    <rect x="220" y="315" width="3" height="6" fill="var(--dirt-jitter-dark, #50351A)" />
    <rect x="350" y="330" width="5" height="5" fill="var(--dirt-jitter-dark, #50351A)" />
    
    <rect x="90" y="310" width="3" height="3" fill="var(--dirt-jitter-light, #A07850)" />
    <rect x="180" y="345" width="4" height="2" fill="var(--dirt-jitter-light, #A07850)" />
    <rect x="290" y="305" width="2" height="2" fill="var(--dirt-jitter-light, #A07850)" />
  </g>

<!-- MUSHROOM STEM DETAIL JITTERS -->
<g transform="translate(-65, 0)" class="tree-detail-jitters">
  <rect x="135" y="180" width="4" height="8" fill="var(--stem-jitter, #BCAD96)" />
  <rect x="150" y="230" width="6" height="4" fill="var(--stem-jitter, #BCAD96)" />
  <rect x="130" y="260" width="10" height="2" fill="var(--stem-jitter, #BCAD96)" />
  
  <!-- Red Cap Jitters -->
  <rect x="100" y="110" width="8" height="8" fill="var(--red-jitter-dark, #8A0A0A)" />
  <rect x="160" y="140" width="12" height="6" fill="var(--red-jitter-dark, #8A0A0A)" />
  <rect x="140" y="80" width="6" height="6" fill="var(--red-jitter-light, #D22B2B)" />
</g>

<!-- STONE CRUST JITTERS -->
<g class="stone-surface-jitters">
  <rect x="255" y="245" width="4" height="4" fill="#696969" />
  <rect x="280" y="265" width="10" height="2" fill="#696969" />
  <rect x="295" y="230" width="3" height="3" fill="#A9A9A9" />
  
  <!-- Mycelium encroachment on stone -->
  <rect x="230" y="278" width="12" height="4" fill="#5A4D5A" />
  <rect x="320" y="278" width="8" height="3" fill="#5A4D5A" />
</g>

<!-- SMALL RED MUSHROOM (Replaces Poppy) -->
<g class="flower-poppy" transform="translate(45, 260)">
  <rect x="2" y="10" width="2" height="10" fill="#D1C4AC" /> <!-- Stem -->
  <rect x="0" y="4" width="6" height="6" fill="#B11010" />  <!-- Cap -->
  <rect x="2" y="5" width="2" height="2" fill="#FFFFFF" />  <!-- Spot -->
</g>

<!-- SMALL BROWN MUSHROOM (Replaces Dandelion) -->
<g class="flower-dandelion" transform="translate(180, 270)">
  <rect x="3" y="6" width="2" height="4" fill="#D1C4AC" /> <!-- Stem -->
  <rect x="0" y="2" width="8" height="4" fill="#7D5D44" /> <!-- Cap -->
</g>

<!-- SMALL PURPLE FUNGUS (Replaces Blue Orchid) -->
<g class="flower-orchid" transform="translate(320, 262)">
  <rect x="3" y="8" width="2" height="10" fill="#D1C4AC" /> <!-- Stem -->
  <rect x="0" y="4" width="6" height="4" fill="#8E44AD" /> <!-- Cap -->
</g>

</svg>

