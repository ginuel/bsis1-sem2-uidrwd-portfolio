<svg width="64" height="64" viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Skin Base -->
  <rect x="0" y="0" width="8" height="8" fill="#AF8569" />
  
  <!-- Hair -->
  <rect x="0" y="0" width="8" height="2" fill="#3D2011" />
  <rect x="0" y="2" width="1" height="1" fill="#3D2011" />
  <rect x="7" y="2" width="1" height="1" fill="#3D2011" />
  
  <!-- Eyes (White part) -->
  <rect x="1" y="4" width="2" height="1" fill="#FFFFFF" />
  <rect x="5" y="4" width="2" height="1" fill="#FFFFFF" />
  
  <!-- Pupils (Purple/Blue) -->
  <rect x="2" y="4" width="1" height="1" fill="#463AA1" />
  <rect x="5" y="4" width="1" height="1" fill="#463AA1" />
  
  <!-- Nose/Mouth Area -->
  <rect x="3" y="5" width="2" height="1" fill="#926049" />
  
  <!-- Beard/Mouth -->
  <rect x="2" y="6" width="4" height="1" fill="#3D2011" />
  <rect x="3" y="6" width="2" height="1" fill="#4E3123" />
</svg>

