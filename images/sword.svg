<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Handle/Hilt -->
  <rect x="20" y="120" width="20" height="20" fill="#533b2b" />
  <rect x="40" y="100" width="20" height="20" fill="#533b2b" />
  <!-- Crossguard -->
  <rect x="20" y="80" width="20" height="20" fill="#31d1d1" />
  <rect x="40" y="80" width="20" height="20" fill="#31d1d1" />
  <rect x="60" y="100" width="20" height="20" fill="#31d1d1" />
  <rect x="60" y="120" width="20" height="20" fill="#31d1d1" />
  <!-- Blade (Diagonal) -->
  <rect x="60" y="60" width="20" height="20" fill="#31d1d1" />
  <rect x="80" y="40" width="20" height="20" fill="#31d1d1" />
  <rect x="100" y="20" width="20" height="20" fill="#31d1d1" />
  <rect x="120" y="0" width="20" height="20" fill="#31d1d1" />
  <!-- Shine Detail -->
  <rect x="120" y="0" width="8" height="8" fill="#ffffff" opacity="0.5" />
</svg>

