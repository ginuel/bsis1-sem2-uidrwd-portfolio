<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
  </defs>

  <!-- 1. SWAMP OAK TREE (With Vines) -->
  <g transform="translate(-65, 0)">
    <!-- Trunk -->
    <rect x="130" y="160" width="30" height="120" fill="var(--tree-trunk, #4A3B22)" />
    <!-- Bottom Leaves (Murky Green) -->
    <rect x="85" y="140" width="120" height="60" fill="var(--leaf-dark, #404E24)" /> 
    <!-- Middle Leaves -->
    <rect x="95" y="100" width="100" height="60" fill="var(--leaf-mid, #505F2D)" /> 
    <!-- Top Leaves (Lightest Swamp) -->
    <rect x="120" y="70" width="50" height="40" fill="var(--leaf-light, #5D6D36)" />
    
    <!-- Vines (Swamp Characteristic) -->
    <rect x="90" y="150" width="4" height="60" fill="#3A441D" opacity="0.8" />
    <rect x="180" y="120" width="4" height="80" fill="#3A441D" opacity="0.8" />
    <rect x="145" y="180" width="4" height="50" fill="#3A441D" opacity="0.8" />
  </g>

  <!-- 2. THE BIG STONE (Mossy Back Layer) -->
  <rect x="230" y="230" width="90" height="50" fill="#5D634E" /> 
  <rect x="215" y="260" width="15" height="20" fill="#4B523E" />

  <!-- 3. THE DIAMOND SWORD (Glow Applied) -->
  <g transform="translate(275, 210) rotate(180)">
    <rect x="0" y="0" width="6" height="12" fill="#5C4033" /> 
    <rect x="-6" y="-4" width="18" height="6" fill="#724924" /> 
    <rect x="0" y="-40" width="6" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="1" /> 
  </g>

  <!-- 4. THE BIG STONE (Mossy Front Layer) -->
  <rect x="245" y="235" width="60" height="45" fill="#6A7356" /> 
  <rect x="290" y="220" width="25" height="15" fill="#6A7356" /> 
  <rect x="305" y="250" width="20" height="30" fill="#6A7356" />

  <!-- 5. SWAMP WATER/MUD CRUST -->
  <rect x="0" y="280" width="400" height="20" fill="var(--grass-main, #3D4428)" /> <!-- Swamp Grass -->
  <rect x="0" y="300" width="400" height="60" fill="var(--dirt-main, #2F291E)" /> <!-- Deep Mud -->
  
  <!-- Mud Jitters (Direct) -->
  <rect x="40" y="310" width="3" height="3" fill="var(--dirt-jitter-dark, #1A1710)" />
  <rect x="280" y="340" width="3" height="3" fill="var(--dirt-jitter-mid, #252018)" />

  <!-- SWAMP GRASS JITTERS -->
  <g class="crust-jitters">
    <!-- Darker Grass patches (Algae) -->
    <rect x="30" y="280" width="10" height="4" fill="var(--grass-jitter-dark, #2D331A)" />
    <rect x="120" y="280" width="15" height="2" fill="var(--grass-jitter-dark, #2D331A)" />
    <rect x="250" y="280" width="8" height="5" fill="var(--grass-jitter-dark, #2D331A)" />
    <rect x="360" y="280" width="12" height="3" fill="var(--grass-jitter-dark, #2D331A)" />
    
    <!-- Lighter Grass patches (Mossy highlights) -->
    <rect x="70" y="280" width="6" height="3" fill="var(--grass-jitter-light, #505834)" />
    <rect x="190" y="280" width="10" height="2" fill="var(--grass-jitter-light, #505834)" />
    <rect x="310" y="280" width="4" height="4" fill="var(--grass-jitter-light, #505834)" />
  </g>

  <!-- MUD CRUST JITTERS -->
  <g class="soil-jitters">
    <rect x="60" y="320" width="4" height="4" fill="var(--dirt-jitter-dark, #1A1710)" />
    <rect x="140" y="340" width="6" height="3" fill="var(--dirt-jitter-dark, #1A1710)" />
    <rect x="220" y="315" width="3" height="6" fill="var(--dirt-jitter-dark, #1A1710)" />
    <rect x="350" y="330" width="5" height="5" fill="var(--dirt-jitter-dark, #1A1710)" />
    
    <rect x="90" y="310" width="3" height="3" fill="var(--dirt-jitter-light, #40382B)" />
    <rect x="180" y="345" width="4" height="2" fill="var(--dirt-jitter-light, #40382B)" />
    <rect x="290" y="305" width="2" height="2" fill="var(--dirt-jitter-light, #40382B)" />
  </g>


<!-- TREE DETAIL JITTERS -->
<g transform="translate(-65, 0)" class="tree-detail-jitters">
  <rect x="135" y="180" width="4" height="8" fill="var(--tree-bark-jitter, #2D2415)" />
  <rect x="150" y="230" width="6" height="4" fill="var(--tree-bark-jitter, #2D2415)" />
  <rect x="130" y="260" width="10" height="2" fill="var(--tree-bark-jitter, #2D2415)" />
  
  <rect x="100" y="110" width="8" height="8" fill="var(--leaf-jitter-dark, #2E3618)" />
  <rect x="160" y="150" width="12" height="6" fill="var(--leaf-jitter-dark, #2E3618)" />
  <rect x="140" y="80" width="6" height="6" fill="var(--leaf-jitter-light, #6F7F41)" />
</g>


<!-- MOSSY STONE CRUST JITTERS -->
<g class="stone-surface-jitters">
  <rect x="255" y="245" width="4" height="4" fill="#4B523E" />
  <rect x="280" y="265" width="10" height="2" fill="#4B523E" />
  <rect x="295" y="230" width="3" height="3" fill="#8A9374" />
  
  <rect x="230" y="278" width="12" height="4" fill="#3D4428" />
  <rect x="320" y="278" width="8" height="3" fill="#3D4428" />
</g>

<!-- MUSHROOM (BROWN) -->
<g class="swamp-mushroom-brown" transform="translate(45, 265)">
  <rect x="2" y="5" width="2" height="5" fill="#E2D6C5" /> <!-- Stem -->
  <rect x="0" y="0" width="6" height="6" fill="#7C5D44" />  <!-- Cap -->
  <rect x="1" y="1" width="2" height="2" fill="#967359" />  <!-- Highlight -->
</g>


<!-- BLUE ORCHID (Native to Swamp) -->
<g class="flower-orchid" transform="translate(180, 270)">
  <rect x="3" y="6" width="2" height="4" fill="#2D331A" /> <!-- Stem -->
  <rect x="1" y="2" width="6" height="4" fill="#2EBDD3" /> <!-- Flower Head -->
  <rect x="3" y="0" width="2" height="2" fill="#D2F3F7" /> <!-- Top Trim -->
</g>

<!-- LILY PAD (Replaces Blue Orchid space) -->
<g class="lily-pad" transform="translate(320, 275)">
  <rect x="0" y="0" width="14" height="4" fill="#4A5F20" /> <!-- Main Pad -->
  <rect x="6" y="0" width="2" height="2" fill="#3D4428" /> <!-- Notch -->
</g>

</svg>

