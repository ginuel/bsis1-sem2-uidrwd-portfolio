<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
  </defs>

  <!-- 1. KELP TALL PLANT (Replaces Oak Tree) -->
  <g transform="translate(-65, 0)">
    <!-- Main Kelp Stem -->
    <rect x="140" y="80" width="10" height="200" fill="var(--kelp-mid, #5B8227)" />
    <!-- Kelp Leaves (Bottom) -->
    <rect x="125" y="200" width="40" height="20" fill="var(--kelp-dark, #3E591B)" /> 
    <!-- Kelp Leaves (Middle) -->
    <rect x="130" y="140" width="30" height="20" fill="var(--kelp-mid, #5B8227)" /> 
    <!-- Kelp Top -->
    <rect x="135" y="80" width="20" height="20" fill="var(--kelp-light, #8FB331)" />
  </g>

  <!-- 2. THE BIG STONE (Underwater Rock) -->
  <rect x="230" y="230" width="90" height="50" fill="#4A5B66" /> 
  <rect x="215" y="260" width="15" height="20" fill="#3A4750" />

  <!-- 3. THE TRIDENT (Replaces Diamond Sword) -->
  <g transform="translate(275, 210) rotate(180)">
    <!-- Shaft -->
    <rect x="0" y="0" width="6" height="25" fill="#759DA3" /> 
    <!-- Guard -->
    <rect x="-6" y="-4" width="18" height="4" fill="#A5C6C9" /> 
    <!-- Tines with Glow Applied -->
    <rect x="-6" y="-30" width="4" height="26" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="0.5" />
    <rect x="1" y="-40" width="4" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="0.5" />
    <rect x="8" y="-30" width="4" height="26" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="0.5" />
  </g>

  <!-- 4. THE BIG STONE (Front Layer) -->
  <rect x="245" y="235" width="60" height="45" fill="#5F7885" /> 
  <rect x="290" y="220" width="25" height="15" fill="#5F7885" /> 
  <rect x="305" y="250" width="20" height="30" fill="#5F7885" />

  <!-- 5. OCEAN FLOOR (Gravel/Sand Template) -->
  <rect x="0" y="280" width="400" height="20" fill="var(--ocean-top, #C2B280)" /> 
  <rect x="0" y="300" width="400" height="60" fill="var(--ocean-deep, #8B7355)" /> 
  
  <!-- Silt Jitters -->
  <rect x="40" y="310" width="3" height="3" fill="var(--silt-dark, #504331)" />
  <rect x="280" y="340" width="3" height="3" fill="var(--silt-mid, #6B5942)" />

  <!-- SAND SURFACE JITTERS -->
  <g class="crust-jitters">
    <!-- Darker Silt patches -->
    <rect x="30" y="280" width="10" height="4" fill="var(--silt-dark, #8B7355)" />
    <rect x="120" y="280" width="15" height="2" fill="var(--silt-dark, #8B7355)" />
    <rect x="250" y="280" width="8" height="5" fill="var(--silt-dark, #8B7355)" />
    <rect x="360" y="280" width="12" height="3" fill="var(--silt-dark, #8B7355)" />
    
    <!-- Shells/Light Sand -->
    <rect x="70" y="280" width="6" height="3" fill="var(--shell-light, #E6E0C5)" />
    <rect x="190" y="280" width="10" height="2" fill="var(--shell-light, #E6E0C5)" />
    <rect x="310" y="280" width="4" height="4" fill="var(--shell-light, #E6E0C5)" />
  </g>

  <!-- DEEP BED JITTERS -->
  <g class="soil-jitters">
    <rect x="60" y="320" width="4" height="4" fill="#504331" />
    <rect x="140" y="340" width="6" height="3" fill="#504331" />
    <rect x="220" y="315" width="3" height="6" fill="#504331" />
    <rect x="350" y="330" width="5" height="5" fill="#504331" />
    
    <rect x="90" y="310" width="3" height="3" fill="#A69477" />
    <rect x="180" y="345" width="4" height="2" fill="#A69477" />
    <rect x="290" y="305" width="2" height="2" fill="#A69477" />
  </g>


<!-- KELP DETAIL JITTERS -->
<g transform="translate(-65, 0)" class="tree-detail-jitters">
  <!-- Kelp texture -->
  <rect x="142" y="100" width="2" height="150" fill="#3E591B" opacity="0.5" />
  
  <!-- Bubble Jitters -->
  <rect x="120" y="110" width="4" height="4" fill="#D0F0FF" opacity="0.6" />
  <rect x="165" y="150" width="3" height="3" fill="#D0F0FF" opacity="0.6" />
  <rect x="110" y="80" width="5" height="5" fill="#D0F0FF" opacity="0.4" />
</g>


<!-- STONE ALGAE JITTERS -->
<g class="stone-surface-jitters">
  <rect x="255" y="245" width="4" height="4" fill="#2E521C" />
  <rect x="280" y="265" width="10" height="2" fill="#2E521C" />
  <rect x="295" y="230" width="3" height="3" fill="#78C16D" />
  
  <rect x="230" y="278" width="12" height="4" fill="#3A4750" />
  <rect x="320" y="278" width="8" height="3" fill="#3A4750" />
</g>

<!-- CORAL (PINK) -->
<g class="coral-pink" transform="translate(45, 260)">
  <rect x="2" y="10" width="4" height="10" fill="#FF69B4" /> 
  <rect x="0" y="14" width="8" height="4" fill="#FF1493" />  
  <rect x="2" y="12" width="6" height="2" fill="#FFC0CB" />  
</g>


<!-- SEA PICKLE -->
<g class="sea-pickle" transform="translate(180, 274)">
  <rect x="3" y="2" width="4" height="4" fill="#5B8227" /> 
  <rect x="4" y="0" width="2" height="2" fill="#8FB331" /> 
</g>

<!-- SEAGRASS -->
<g class="seagrass" transform="translate(320, 262)">
  <rect x="3" y="8" width="2" height="10" fill="#3D6B25" /> 
  <rect x="1" y="12" width="2" height="6" fill="#3D6B25" /> 
  <rect x="5" y="14" width="2" height="4" fill="#3D6B25" /> 
</g>

</svg>

