<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
  </defs>

  <!-- 1. MEADOW BIRCH TREE (Replaces Oak) -->
  <g transform="translate(-65, 0)">
    <!-- Birch Trunk -->
    <rect x="130" y="140" width="30" height="140" fill="#F0F0F0" />
    <!-- Birch Markings -->
    <rect x="130" y="160" width="8" height="4" fill="#2E2E2E" />
    <rect x="152" y="200" width="8" height="4" fill="#2E2E2E" />
    <rect x="130" y="240" width="12" height="4" fill="#2E2E2E" />
    
    <!-- Bottom Leaves (Vibrant Meadow Green) -->
    <rect x="85" y="120" width="120" height="60" fill="#50A020" /> 
    <!-- Middle Leaves -->
    <rect x="95" y="80" width="100" height="60" fill="#5EB825" /> 
    <!-- Top Leaves -->
    <rect x="120" y="50" width="50" height="40" fill="#70D130" />
  </g>

  <!-- 2. THE BIG STONE (Back Layer) -->
  <rect x="230" y="230" width="90" height="50" fill="#696969" /> 
  <rect x="215" y="260" width="15" height="20" fill="#5A5A5A" />

  <!-- 3. THE DIAMOND SWORD (Glow Applied) -->
  <g transform="translate(275, 210) rotate(180)">
    <rect x="0" y="0" width="6" height="12" fill="#5C4033" /> 
    <rect x="-6" y="-4" width="18" height="6" fill="#724924" /> 
    <rect x="0" y="-40" width="6" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="1" /> 
  </g>

  <!-- 4. THE BIG STONE (Front Layer) -->
  <rect x="245" y="235" width="60" height="45" fill="#808080" /> 
  <rect x="290" y="220" width="25" height="15" fill="#808080" /> 
  <rect x="305" y="250" width="20" height="30" fill="#808080" />

  <!-- 5. MEADOW CRUST (Vibrant Grass) -->
  <rect x="0" y="280" width="400" height="20" fill="#5EB825" /> 
  <rect x="0" y="300" width="400" height="60" fill="#8B5A2B" /> 
  
  <!-- Soil Jitters -->
  <rect x="40" y="310" width="3" height="3" fill="#50351A" />
  <rect x="280" y="340" width="3" height="3" fill="#724924" />

  <!-- MEADOW GRASS JITTERS -->
  <g class="crust-jitters">
    <rect x="30" y="280" width="10" height="4" fill="#50A020" />
    <rect x="120" y="280" width="15" height="2" fill="#50A020" />
    <rect x="250" y="280" width="8" height="5" fill="#50A020" />
    <rect x="360" y="280" width="12" height="3" fill="#50A020" />
    
    <rect x="70" y="280" width="6" height="3" fill="#96E050" />
    <rect x="190" y="280" width="10" height="2" fill="#96E050" />
    <rect x="310" y="280" width="4" height="4" fill="#96E050" />
  </g>

  <!-- DIRT CRUST JITTERS -->
  <g class="soil-jitters">
    <rect x="60" y="320" width="4" height="4" fill="#50351A" />
    <rect x="140" y="340" width="6" height="3" fill="#50351A" />
    <rect x="220" y="315" width="3" height="6" fill="#50351A" />
    <rect x="90" y="310" width="3" height="3" fill="#A07850" />
    <rect x="180" y="345" width="4" height="2" fill="#A07850" />
  </g>

<!-- TREE DETAIL JITTERS -->
<g transform="translate(-65, 0)" class="tree-detail-jitters">
  <rect x="135" y="180" width="4" height="4" fill="#D0D0D0" />
  <rect x="150" y="230" width="4" height="4" fill="#D0D0D0" />
  
  <rect x="100" y="90" width="8" height="8" fill="#40851A" />
  <rect x="160" y="130" width="12" height="6" fill="#40851A" />
  <rect x="140" y="60" width="6" height="6" fill="#96E050" />
</g>

<!-- STONE CRUST JITTERS -->
<g class="stone-surface-jitters">
  <rect x="255" y="245" width="4" height="4" fill="#696969" />
  <rect x="280" y="265" width="10" height="2" fill="#696969" />
  <rect x="295" y="230" width="3" height="3" fill="#A9A9A9" />
  <rect x="230" y="278" width="12" height="4" fill="#5A5A5A" />
</g>

<!-- ALLIUM (Meadow Specific) -->
<g class="flower-allium" transform="translate(45, 255)">
  <rect x="2" y="15" width="2" height="10" fill="#50A020" /> <!-- Stem -->
  <rect x="0" y="9" width="6" height="6" fill="#B57EDC" />  <!-- Petals -->
  <rect x="1" y="8" width="4" height="1" fill="#D8BFD8" />  <!-- Highlight -->
</g>


<!-- OXEYE DAISY (Meadow Specific) -->
<g class="flower-daisy" transform="translate(180, 270)">
  <rect x="3" y="6" width="2" height="4" fill="#50A020" /> <!-- Stem -->
  <rect x="0" y="2" width="8" height="4" fill="#FFFFFF" /> <!-- White Petals -->
  <rect x="3" y="3" width="2" height="2" fill="#F1C40F" /> <!-- Yellow Center -->
</g>

<!-- PINK TULIP (Meadow Specific) -->
<g class="flower-tulip" transform="translate(320, 262)">
  <rect x="3" y="8" width="2" height="10" fill="#50A020" /> <!-- Stem -->
  <rect x="1" y="2" width="6" height="6" fill="#FF80AB" /> <!-- Bloom -->
  <rect x="2" y="0" width="4" height="2" fill="#FF80AB" /> <!-- Top -->
</g>

</svg>

