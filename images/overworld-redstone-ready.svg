<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
  </defs>

  <!-- 1. OAK TREE (Removed for Redstone Ready Superflat) -->
  <!-- Landmark removed per request to reflect the empty superflat horizon -->

  <!-- 2. THE BIG STONE (Back Layer) -->
  <rect x="230" y="230" width="90" height="50" fill="#696969" /> 
  <rect x="215" y="260" width="15" height="20" fill="#5A5A5A" />

  <!-- 3. THE DIAMOND SWORD (Glow Applied) -->
  <g transform="translate(275, 210) rotate(180)">
    <rect x="0" y="0" width="6" height="12" fill="#5C4033" /> 
    <rect x="-6" y="-4" width="18" height="6" fill="#724924" /> 
    <!-- The Blade now uses the bladeGlow gradient -->
    <rect x="0" y="-40" width="6" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="1" /> 
  </g>

  <!-- 4. THE BIG STONE (Front Layer) -->
  <rect x="245" y="235" width="60" height="45" fill="#808080" /> 
  <rect x="290" y="220" width="25" height="15" fill="#808080" /> 
  <rect x="305" y="250" width="20" height="30" fill="#808080" />

  <!-- 5. MICRO-JITTER CRUST (Sandstone Palette for Redstone Ready) -->
  <!-- Top layer is Smooth Sandstone -->
  <rect x="0" y="280" width="400" height="20" fill="#E3D4A1" /> 
  <!-- Lower layer is Sandstone -->
  <rect x="0" y="300" width="400" height="60" fill="#D1BA8A" /> 
  
  <!-- Soil Jitters (Direct) -->
  <rect x="40" y="310" width="3" height="3" fill="#B39C6B" />
  <rect x="280" y="340" width="3" height="3" fill="#C2AB7A" />

  <!-- SANDSTONE CRUST JITTERS (Replacing Grass Jitters) -->
  <g class="crust-jitters">
    <!-- Darker Sandstone patches -->
    <rect x="30" y="280" width="10" height="4" fill="#D1BA8A" />
    <rect x="120" y="280" width="15" height="2" fill="#D1BA8A" />
    <rect x="250" y="280" width="8" height="5" fill="#D1BA8A" />
    <rect x="360" y="280" width="12" height="3" fill="#D1BA8A" />
    
    <!-- Lighter Sandstone patches (Highlights) -->
    <rect x="70" y="280" width="6" height="3" fill="#EFE4B0" />
    <rect x="190" y="280" width="10" height="2" fill="#EFE4B0" />
    <rect x="310" y="280" width="4" height="4" fill="#EFE4B0" />
  </g>

  <!-- SANDSTONE DEPTH JITTERS (Replacing Dirt Jitters) -->
  <g class="soil-jitters">
    <!-- Deep Sandstone (Darker) -->
    <rect x="60" y="320" width="4" height="4" fill="#B39C6B" />
    <rect x="140" y="340" width="6" height="3" fill="#B39C6B" />
    <rect x="220" y="315" width="3" height="6" fill="#B39C6B" />
    <rect x="350" y="330" width="5" height="5" fill="#B39C6B" />
    
    <!-- Coarse Sandstone/Grit (Lighter) -->
    <rect x="90" y="310" width="3" height="3" fill="#DBC695" />
    <rect x="180" y="345" width="4" height="2" fill="#DBC695" />
    <rect x="290" y="305" width="2" height="2" fill="#DBC695" />
  </g>


<!-- TREE DETAIL JITTERS (Removed for Redstone Ready Superflat) -->


<!-- STONE CRUST JITTERS -->
<g class="stone-surface-jitters">
  <!-- Front Stone Texture (#808080 layer) -->
  <rect x="255" y="245" width="4" height="4" fill="#696969" />
  <rect x="280" y="265" width="10" height="2" fill="#696969" />
  <rect x="295" y="230" width="3" height="3" fill="#A9A9A9" />
  
  <!-- Edge Jitters (Where stone meets sandstone) -->
  <rect x="230" y="278" width="12" height="4" fill="#C2AB7A" />
  <rect x="320" y="278" width="8" height="3" fill="#C2AB7A" />
</g>

<!-- REDSTONE TORCH (Replaces Poppy) -->
<g class="redstone-torch" transform="translate(45, 260)">
  <rect x="2" y="10" width="2" height="10" fill="#724924" /> <!-- Stick -->
  <rect x="0" y="4" width="6" height="6" fill="#990000" />  <!-- Unlit Torch -->
  <rect x="2" y="2" width="2" height="2" fill="#FF0000" />  <!-- Lit Tip -->
  <rect x="2" y="6" width="2" height="2" fill="#FF5555" />  <!-- Glow -->
</g>


<!-- LEVER (Replaces Dandelion) -->
<g class="lever" transform="translate(180, 270)">
  <rect x="0" y="6" width="8" height="4" fill="#696969" /> <!-- Cobblestone Base -->
  <rect x="3" y="0" width="2" height="6" fill="#724924" /> <!-- Handle -->
</g>

<!-- REDSTONE DUST (Replaces Blue Orchid) -->
<g class="redstone-dust" transform="translate(320, 276)">
  <rect x="0" y="0" width="10" height="2" fill="#720000" /> <!-- Trace -->
  <rect x="2" y="-2" width="2" height="2" fill="#FF0000" /> <!-- Sparkle -->
  <rect x="6" y="1" width="2" height="2" fill="#990000" /> <!-- Particle -->
</g>

</svg>

