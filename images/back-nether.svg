  <!-- Darker Pockets -->
  <rect x="1" y="2" width="2" height="2" fill="#4a0d0d" />
  <rect x="8" y="1" width="3" height="2" fill="#4a0d0d" />
  <rect x="4" y="9" width="2" height="3" fill="#4a0d0d" />
  <rect x="12" y="10" width="3" height="2" fill="#4a0d0d" />
  
  <!-- Lighter Highlights -->
  <rect x="3" y="1" width="1" height="1" fill="#9e2a2a" />
  <rect x="11" y="4" width="2" height="1" fill="#9e2a2a" />
  <rect x="2" y="12" width="2" height="1" fill="#9e2a2a" />
  <rect x="9" y="14" width="1" height="1" fill="#9e2a2a" />
  
  <!-- Deep Shadows -->
  <rect x="0" y="7" width="2" height="1" fill="#310808" />
