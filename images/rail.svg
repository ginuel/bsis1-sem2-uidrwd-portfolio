<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">


	<g style="
		transform: rotate(90deg);
		transform-origin: center;
		transform-box: fill-box;
	">
		<!-- Background (Transparent/Empty) -->
		<rect width="16" height="16" fill="none"/>

		<!-- Wooden Ties (Treads) -->
		<!-- Tie 1: Row 1 (Gap 1 from top) -->
		<rect x="0" y="1" width="16" height="2" fill="#725437" />
		<rect x="0" y="1" width="16" height="1" fill="#8D6945" /> <!-- Highlight -->
		<rect x="3" y="1" width="2" height="1" fill="#A67B52" />  <!-- Grain -->
		
		<!-- Tie 2: Row 5 (Gap 2 from Tie 1) -->
		<rect x="0" y="5" width="16" height="2" fill="#725437" />
		<rect x="0" y="5" width="16" height="1" fill="#8D6945" />
		<rect x="11" y="5" width="2" height="1" fill="#A67B52" />

		<!-- Tie 3: Row 9 (Gap 2 from Tie 2) -->
		<rect x="0" y="9" width="16" height="2" fill="#725437" />
		<rect x="0" y="9" width="16" height="1" fill="#8D6945" />
		<rect x="5" y="9" width="3" height="1" fill="#A67B52" />

		<!-- Tie 4: Row 13 (Gap 2 from Tie 3, leaves 1 at bottom) -->
		<rect x="0" y="13" width="16" height="2" fill="#725437" />
		<rect x="0" y="13" width="16" height="1" fill="#8D6945" />
		
		<!-- Steel Rails (Vertical) -->
		<!-- Left Rail (at columns 2-3) -->
		<rect x="2" y="0" width="2" height="16" fill="#A0A0A0" />
		<rect x="2" y="0" width="1" height="16" fill="#D0D0D0" /> <!-- Highlight -->
		<rect x="3" y="0" width="1" height="16" fill="#707070" /> <!-- Shadow -->

		<!-- Right Rail (at columns 12-13) -->
		<rect x="12" y="0" width="2" height="16" fill="#A0A0A0" />
		<rect x="12" y="0" width="1" height="16" fill="#D0D0D0" /> <!-- Highlight -->
		<rect x="13" y="0" width="1" height="16" fill="#707070" /> <!-- Shadow -->

		<!-- Rail Fasteners (Small details where rail meets wood) -->
		<rect x="2" y="1" width="2" height="1" fill="#505050" opacity="0.5" />
		<rect x="12" y="1" width="2" height="1" fill="#505050" opacity="0.5" />
		<rect x="2" y="5" width="2" height="1" fill="#505050" opacity="0.5" />
		<rect x="12" y="5" width="2" height="1" fill="#505050" opacity="0.5" />
		<rect x="2" y="9" width="2" height="1" fill="#505050" opacity="0.5" />
		<rect x="12" y="9" width="2" height="1" fill="#505050" opacity="0.5" />
		<rect x="2" y="13" width="2" height="1" fill="#505050" opacity="0.5" />
		<rect x="12" y="13" width="2" height="1" fill="#505050" opacity="0.5" />
	</g>
</svg>

