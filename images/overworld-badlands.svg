<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
  </defs>

  <!-- 1. OAK TREE (Wooded Badlands Plateaus often have Oak) -->
  <g transform="translate(-65, 0)">
    <!-- Trunk -->
    <rect x="130" y="160" width="30" height="120" fill="#6B5132" />
    <!-- Bottom Leaves (Darkest - Badlands Oak is a bit more olive/desaturated) -->
    <rect x="85" y="140" width="120" height="60" fill="#4B5320" /> 
    <!-- Middle Leaves -->
    <rect x="95" y="100" width="100" height="60" fill="#556B2F" /> 
    <!-- Top Leaves (Lightest) -->
    <rect x="120" y="70" width="50" height="40" fill="#6B8E23" />
  </g>

  <!-- 2. THE BIG STONE (Back Layer) -->
  <rect x="230" y="230" width="90" height="50" fill="#696969" /> 
  <rect x="215" y="260" width="15" height="20" fill="#5A5A5A" />

  <!-- 3. THE DIAMOND SWORD (Glow Applied) -->
  <g transform="translate(275, 210) rotate(180)">
    <rect x="0" y="0" width="6" height="12" fill="#5C4033" /> 
    <rect x="-6" y="-4" width="18" height="6" fill="#724924" /> 
    <!-- The Blade now uses the bladeGlow gradient -->
    <rect x="0" y="-40" width="6" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="1" /> 
  </g>

  <!-- 4. THE BIG STONE (Front Layer) -->
  <rect x="245" y="235" width="60" height="45" fill="#808080" /> 
  <rect x="290" y="220" width="25" height="15" fill="#808080" /> 
  <rect x="305" y="250" width="20" height="30" fill="#808080" />

  <!-- 5. MICRO-JITTER CRUST (Terracotta/Red Sand Theme) -->
  <rect x="0" y="280" width="400" height="20" fill="#A0522D" /> <!-- Red Sand Top -->
  <rect x="0" y="300" width="400" height="60" fill="#8B4513" /> <!-- Orange Terracotta Layer -->
  
  <!-- Soil Jitters (Direct) -->
  <rect x="40" y="310" width="3" height="3" fill="#5D2906" />
  <rect x="280" y="340" width="3" height="3" fill="#6F370D" />

  <!-- RED SAND CRUST JITTERS -->
  <g class="crust-jitters">
    <!-- Darker Patches -->
    <rect x="30" y="280" width="10" height="4" fill="#8B4513" />
    <rect x="120" y="280" width="15" height="2" fill="#8B4513" />
    <rect x="250" y="280" width="8" height="5" fill="#8B4513" />
    <rect x="360" y="280" width="12" height="3" fill="#8B4513" />
    
    <!-- Lighter Patches (Eroded Sand) -->
    <rect x="70" y="280" width="6" height="3" fill="#CD853F" />
    <rect x="190" y="280" width="10" height="2" fill="#CD853F" />
    <rect x="310" y="280" width="4" height="4" fill="#CD853F" />
  </g>

  <!-- TERRACOTTA JITTERS -->
  <g class="soil-jitters">
    <!-- Deep Strata -->
    <rect x="60" y="320" width="4" height="4" fill="#5D2906" />
    <rect x="140" y="340" width="6" height="3" fill="#5D2906" />
    <rect x="220" y="315" width="3" height="6" fill="#5D2906" />
    <rect x="350" y="330" width="5" height="5" fill="#5D2906" />
    
    <!-- Coarse Deposits -->
    <rect x="90" y="310" width="3" height="3" fill="#D2691E" />
    <rect x="180" y="345" width="4" height="2" fill="#D2691E" />
    <rect x="290" y="305" width="2" height="2" fill="#D2691E" />
  </g>


<!-- TREE DETAIL JITTERS -->
<g transform="translate(-65, 0)" class="tree-detail-jitters">
  <!-- Bark Knots and Texture -->
  <rect x="135" y="180" width="4" height="8" fill="#4D3A24" />
  <rect x="150" y="230" width="6" height="4" fill="#4D3A24" />
  <rect x="130" y="260" width="10" height="2" fill="#4D3A24" />
  
  <!-- Leaf Density Jitters -->
  <rect x="100" y="110" width="8" height="8" fill="#3A4118" />
  <rect x="160" y="150" width="12" height="6" fill="#3A4118" />
  <rect x="140" y="80" width="6" height="6" fill="#7B9337" />
</g>


<!-- STONE CRUST JITTERS -->
<g class="stone-surface-jitters">
  <rect x="255" y="245" width="4" height="4" fill="#696969" />
  <rect x="280" y="265" width="10" height="2" fill="#696969" />
  <rect x="295" y="230" width="3" height="3" fill="#A9A9A9" />
  
  <!-- Edge Jitters (Where stone meets red sand) -->
  <rect x="230" y="278" width="12" height="4" fill="#8B4513" />
  <rect x="320" y="278" width="8" height="3" fill="#8B4513" />
</g>

<!-- DEAD BUSH (Replaces Poppy) -->
<g class="flower-poppy" transform="translate(45, 260)">
  <rect x="2" y="10" width="2" height="10" fill="#724924" /> <!-- Stem -->
  <rect x="0" y="8" width="6" height="2" fill="#724924" />  <!-- Petal/Twig -->
  <rect x="-2" y="6" width="2" height="4" fill="#724924" />  <!-- Branch -->
  <rect x="6" y="6" width="2" height="4" fill="#724924" />  <!-- Branch -->
</g>


<!-- DEAD BUSH (Replaces Dandelion) -->
<g class="flower-dandelion" transform="translate(180, 270)">
  <rect x="3" y="6" width="2" height="4" fill="#724924" /> <!-- Stem -->
  <rect x="0" y="4" width="8" height="2" fill="#724924" /> <!-- Twigs -->
  <rect x="2" y="2" width="4" height="2" fill="#724924" /> <!-- Top -->
</g>

<!-- DEAD BUSH (Replaces Blue Orchid) -->
<g class="flower-orchid" transform="translate(320, 262)">
  <rect x="3" y="8" width="2" height="10" fill="#724924" /> <!-- Stem -->
  <rect x="0" y="6" width="4" height="2" fill="#724924" /> <!-- Branch -->
  <rect x="4" y="4" width="4" height="2" fill="#724924" /> <!-- Branch -->
</g>

</svg>

