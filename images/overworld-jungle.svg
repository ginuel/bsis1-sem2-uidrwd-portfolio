<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
  </defs>

  <!-- 1. JUNGLE TREE (Replacing Oak) -->
  <g transform="translate(-65, 0)">
    <!-- Jungle Wood Trunk (Lighter brown, unique texture) -->
    <rect x="130" y="140" width="30" height="140" fill="var(--tree-trunk, #9B7653)" />
    <!-- Main Jungle Canopy (Vibrant green, messy) -->
    <rect x="85" y="80" width="120" height="80" fill="var(--leaf-mid, #30A130)" /> 
    <!-- Canopy Top (Slightly lighter) -->
    <rect x="105" y="50" width="80" height="40" fill="var(--leaf-light, #4AC04A)" />
    <!-- Sparse Bottom leaves (Vines integration area) -->
    <rect x="120" y="160" width="50" height="20" fill="var(--leaf-dark, #208020)" opacity="0.8" />
  </g>

  <!-- 2. THE BIG STONE (Mossy Cobblestone Theme) -->
  <rect x="230" y="230" width="90" height="50" fill="#607060" /> 
  <rect x="215" y="260" width="15" height="20" fill="#506050" />

  <!-- 3. THE DIAMOND SWORD (Glow Applied) -->
  <g transform="translate(275, 210) rotate(180)">
    <rect x="0" y="0" width="6" height="12" fill="#5C4033" /> 
    <rect x="-6" y="-4" width="18" height="6" fill="#724924" /> 
    <!-- The Blade now uses the bladeGlow gradient -->
    <rect x="0" y="-40" width="6" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="1" /> 
  </g>

  <!-- 4. THE BIG STONE (Front Layer - Mossier) -->
  <rect x="245" y="235" width="60" height="45" fill="#708070" /> 
  <rect x="290" y="220" width="25" height="15" fill="#708070" /> 
  <rect x="305" y="250" width="20" height="30" fill="#708070" />

  <!-- 5. MICRO-JITTER CRUST (Lush Jungle Terrain) -->
  <rect x="0" y="280" width="400" height="20" fill="var(--grass-main, #30A130)" /> 
  <rect x="0" y="300" width="400" height="60" fill="var(--dirt-main, #8B5A2B)" /> 
  
  <!-- Soil Jitters (Direct) -->
  <rect x="40" y="310" width="3" height="3" fill="var(--dirt-jitter-dark, #50351A)" />
  <rect x="280" y="340" width="3" height="3" fill="var(--dirt-jitter-mid, #724924)" />

  <!-- LUSH GRASS JITTERS (Vibrant and varied) -->
  <g class="crust-jitters">
    <!-- Deeper jungle floor shades -->
    <rect x="30" y="280" width="10" height="4" fill="var(--grass-jitter-dark, #1A601A)" />
    <rect x="120" y="280" width="15" height="2" fill="var(--grass-jitter-dark, #1A601A)" />
    <rect x="250" y="280" width="8" height="5" fill="var(--grass-jitter-dark, #1A601A)" />
    <rect x="360" y="280" width="12" height="3" fill="var(--grass-jitter-dark, #1A601A)" />
    
    <!-- Lighter jungle highlights (Ferns, new growth) -->
    <rect x="70" y="280" width="6" height="3" fill="var(--grass-jitter-light, #50C050)" />
    <rect x="190" y="280" width="10" height="2" fill="var(--grass-jitter-light, #50C050)" />
    <rect x="310" y="280" width="4" height="4" fill="var(--grass-jitter-light, #50C050)" />
  </g>

  <!-- DIRT CRUST JITTERS -->
  <g class="soil-jitters">
    <!-- Deep Soil (Darker) -->
    <rect x="60" y="320" width="4" height="4" fill="var(--dirt-jitter-dark, #50351A)" />
    <rect x="140" y="340" width="6" height="3" fill="var(--dirt-jitter-dark, #50351A)" />
    <rect x="220" y="315" width="3" height="6" fill="var(--dirt-jitter-dark, #50351A)" />
    <rect x="350" y="330" width="5" height="5" fill="var(--dirt-jitter-dark, #50351A)" />
    
    <!-- Coarse Sand/Rocks (Lighter) -->
    <rect x="90" y="310" width="3" height="3" fill="var(--dirt-jitter-light, #A07850)" />
    <rect x="180" y="345" width="4" height="2" fill="var(--dirt-jitter-light, #A07850)" />
    <rect x="290" y="305" width="2" height="2" fill="var(--dirt-jitter-light, #A07850)" />
  </g>


<!-- JUNGLE TREE DETAIL JITTERS -->
<g transform="translate(-65, 0)" class="tree-detail-jitters">
  <!-- Bark Knots and Texture (Jungle wood specific) -->
  <rect x="135" y="160" width="4" height="12" fill="var(--tree-bark-jitter, #7A5B3E)" />
  <rect x="150" y="210" width="6" height="4" fill="var(--tree-bark-jitter, #7A5B3E)" />
  <rect x="130" y="250" width="10" height="2" fill="var(--tree-bark-jitter, #7A5B3E)" />
  
  <!-- Vines clinging to trunk -->
  <rect x="130" y="180" width="2" height="60" fill="#208020" opacity="0.7" />
  <rect x="158" y="150" width="2" height="40" fill="#208020" opacity="0.6" />
  
  <!-- Leaf Density/Mess Jitters -->
  <rect x="100" y="110" width="8" height="8" fill="var(--leaf-jitter-dark, #1A601A)" />
  <rect x="160" y="130" width="12" height="6" fill="var(--leaf-jitter-dark, #1A601A)" />
  <rect x="140" y="70" width="6" height="6" fill="var(--leaf-jitter-light, #50C050)" />
</g>


<!-- MOSSY STONE CRUST JITTERS -->
<g class="stone-surface-jitters">
  <!-- Stone Texture (#708070 layer) -->
  <rect x="255" y="245" width="4" height="4" fill="#607060" />
  <rect x="280" y="265" width="10" height="2" fill="#607060" />
  <rect x="295" y="230" width="3" height="3" fill="#A0C0A0" /> <!-- Moss highlight -->
  
  <!-- Moss growing between cobble (#708070) -->
  <rect x="245" y="240" width="20" height="2" fill="#409040" />
  <rect x="285" y="255" width="20" height="10" fill="#409040" />

  <!-- Edge Jitters (Where moss meets grass) -->
  <rect x="230" y="278" width="12" height="4" fill="#406040" />
  <rect x="320" y="278" width="8" height="3" fill="#406040" />
</g>

<!-- COCOA POD (Replacing Poppy for jungle theme) -->
<g class="flower-poppy" transform="translate(45, 260)">
  <rect x="2" y="10" width="2" height="10" fill="#3D6B25" /> <!-- Stem -->
  <rect x="0" y="4" width="6" height="6" fill="#BC8F2D" />  <!-- Pod Main -->
  <rect x="1" y="2" width="4" height="2" fill="#936A18" />  <!-- Pod Top -->
  <rect x="2" y="6" width="2" height="2" fill="#FFFFFF" />  <!-- Beans visibility (inside crack) -->
</g>


<!-- FERN (Replacing Dandelion for lush theme) -->
<g class="flower-dandelion" transform="translate(180, 270)">
  <rect x="3" y="6" width="2" height="4" fill="#3D6B25" /> <!-- Stem -->
  <rect x="0" y="0" width="8" height="6" fill="#30A130" /> <!-- Fern Leaf Structure -->
  <rect x="2" y="-2" width="4" height="2" fill="#50C050" /> <!-- Fern Tip -->
</g>

<!-- ORCHID (Directly fits jungle) -->
<g class="flower-orchid" transform="translate(320, 262)">
  <rect x="3" y="8" width="2" height="10" fill="#3D6B25" /> <!-- Stem -->
  <rect x="0" y="4" width="4" height="4" fill="#E95ACF" /> <!-- Pink/Magenta Left Bloom -->
  <rect x="4" y="0" width="4" height="4" fill="#FFFFFF" opacity="0.9" /> <!-- White Right Bloom (Highlight) -->
</g>

</svg>

