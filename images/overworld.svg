<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
  </defs>

  <!-- 1. OAK TREE (Dynamic Template) -->
  <g transform="translate(-65, 0)">
    <!-- Trunk -->
    <rect x="130" y="160" width="30" height="120" fill="var(--tree-trunk, #6B5132)" />
    <!-- Bottom Leaves (Darkest) -->
    <rect x="85" y="140" width="120" height="60" fill="var(--leaf-dark, #3D6B25)" /> 
    <!-- Middle Leaves -->
    <rect x="95" y="100" width="100" height="60" fill="var(--leaf-mid, #4B822C)" /> 
    <!-- Top Leaves (Lightest) -->
    <rect x="120" y="70" width="50" height="40" fill="var(--leaf-light, #5AA351)" />
  </g>

  <!-- 2. THE BIG STONE (Back Layer) -->
  <rect x="230" y="230" width="90" height="50" fill="#696969" /> 
  <rect x="215" y="260" width="15" height="20" fill="#5A5A5A" />

  <!-- 3. THE DIAMOND SWORD (Glow Applied) -->
  <g transform="translate(275, 210) rotate(180)">
    <rect x="0" y="0" width="6" height="12" fill="#5C4033" /> 
    <rect x="-6" y="-4" width="18" height="6" fill="#724924" /> 
    <!-- The Blade now uses the bladeGlow gradient -->
    <rect x="0" y="-40" width="6" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="1" /> 
  </g>

  <!-- 4. THE BIG STONE (Front Layer) -->
  <rect x="245" y="235" width="60" height="45" fill="#808080" /> 
  <rect x="290" y="220" width="25" height="15" fill="#808080" /> 
  <rect x="305" y="250" width="20" height="30" fill="#808080" />

  <!-- 5. MICRO-JITTER CRUST (Dynamic Template) -->
  <rect x="0" y="280" width="400" height="20" fill="var(--grass-main, #5AA351)" /> 
  <rect x="0" y="300" width="400" height="60" fill="var(--dirt-main, #8B5A2B)" /> 
  
  <!-- Soil Jitters (Direct) -->
  <rect x="40" y="310" width="3" height="3" fill="var(--dirt-jitter-dark, #50351A)" />
  <rect x="280" y="340" width="3" height="3" fill="var(--dirt-jitter-mid, #724924)" />

  <!-- GRASS CRUST JITTERS -->
  <g class="crust-jitters">
    <!-- Darker Grass patches (Depth) -->
    <rect x="30" y="280" width="10" height="4" fill="var(--grass-jitter-dark, #3D6B25)" />
    <rect x="120" y="280" width="15" height="2" fill="var(--grass-jitter-dark, #3D6B25)" />
    <rect x="250" y="280" width="8" height="5" fill="var(--grass-jitter-dark, #3D6B25)" />
    <rect x="360" y="280" width="12" height="3" fill="var(--grass-jitter-dark, #3D6B25)" />
    
    <!-- Lighter Grass patches (Highlights) -->
    <rect x="70" y="280" width="6" height="3" fill="var(--grass-jitter-light, #78C16D)" />
    <rect x="190" y="280" width="10" height="2" fill="var(--grass-jitter-light, #78C16D)" />
    <rect x="310" y="280" width="4" height="4" fill="var(--grass-jitter-light, #78C16D)" />
  </g>

  <!-- DIRT CRUST JITTERS -->
  <g class="soil-jitters">
    <!-- Deep Soil (Darker) -->
    <rect x="60" y="320" width="4" height="4" fill="var(--dirt-jitter-dark, #50351A)" />
    <rect x="140" y="340" width="6" height="3" fill="var(--dirt-jitter-dark, #50351A)" />
    <rect x="220" y="315" width="3" height="6" fill="var(--dirt-jitter-dark, #50351A)" />
    <rect x="350" y="330" width="5" height="5" fill="var(--dirt-jitter-dark, #50351A)" />
    
    <!-- Coarse Sand/Rocks (Lighter) -->
    <rect x="90" y="310" width="3" height="3" fill="var(--dirt-jitter-light, #A07850)" />
    <rect x="180" y="345" width="4" height="2" fill="var(--dirt-jitter-light, #A07850)" />
    <rect x="290" y="305" width="2" height="2" fill="var(--dirt-jitter-light, #A07850)" />
  </g>


<!-- TREE DETAIL JITTERS (Dynamic Template) -->
<g transform="translate(-65, 0)" class="tree-detail-jitters">
  <!-- Bark Knots and Texture -->
  <rect x="135" y="180" width="4" height="8" fill="var(--tree-bark-jitter, #4D3A24)" />
  <rect x="150" y="230" width="6" height="4" fill="var(--tree-bark-jitter, #4D3A24)" />
  <rect x="130" y="260" width="10" height="2" fill="var(--tree-bark-jitter, #4D3A24)" />
  
  <!-- Leaf Density Jitters -->
  <rect x="100" y="110" width="8" height="8" fill="var(--leaf-jitter-dark, #2E521C)" />
  <rect x="160" y="150" width="12" height="6" fill="var(--leaf-jitter-dark, #2E521C)" />
  <rect x="140" y="80" width="6" height="6" fill="var(--leaf-jitter-light, #78C16D)" />
</g>


<!-- STONE CRUST JITTERS -->
<g class="stone-surface-jitters">
  <!-- Front Stone Texture (#808080 layer) -->
  <rect x="255" y="245" width="4" height="4" fill="#696969" />
  <rect x="280" y="265" width="10" height="2" fill="#696969" />
  <rect x="295" y="230" width="3" height="3" fill="#A9A9A9" />
  
  <!-- Edge Jitters (Where stone meets grass) -->
  <rect x="230" y="278" width="12" height="4" fill="#5A5A5A" />
  <rect x="320" y="278" width="8" height="3" fill="#5A5A5A" />
</g>

<!-- POPPY -->
<g class="flower-poppy" transform="translate(45, 260)">
  <rect x="2" y="10" width="2" height="10" fill="#3D6B25" /> <!-- Stem -->
  <rect x="0" y="4" width="6" height="6" fill="#BE0000" />  <!-- Petals -->
  <rect x="2" y="2" width="2" height="2" fill="#BE0000" />  <!-- Top Bud -->
  <rect x="2" y="6" width="2" height="2" fill="#50351A" />  <!-- Center -->
</g>


<!-- DANDELION -->
<g class="flower-dandelion" transform="translate(180, 270)">
  <rect x="3" y="6" width="2" height="4" fill="#3D6B25" /> <!-- Stem -->
  <rect x="0" y="2" width="8" height="4" fill="#F1C40F" /> <!-- Flower Head -->
  <rect x="2" y="0" width="4" height="2" fill="#F1C40F" /> <!-- Top Trim -->
</g>

<!-- BLUE ORCHID -->
<g class="flower-orchid" transform="translate(320, 262)">
  <rect x="3" y="8" width="2" height="10" fill="#3D6B25" /> <!-- Stem -->
  <rect x="0" y="4" width="4" height="4" fill="#33E3EC" /> <!-- Left Bloom -->
  <rect x="4" y="0" width="4" height="4" fill="#E0FFFF" /> <!-- Right Bloom (Highlight) -->
</g>

</svg>

