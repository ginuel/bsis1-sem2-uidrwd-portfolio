<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice" shape-rendering="crispEdges">
  <defs>
    <!-- The Enchantment Glow -->
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="100%" stop-color="#33E3EC" />
    </radialGradient>
  </defs>

  <!-- 1. ACACIA TREE (Savannah Template) -->
  <g transform="translate(-65, 0)">
    <!-- Main Trunk -->
    <rect x="130" y="200" width="20" height="80" fill="#6B5132" />
    <!-- Branch Shift (Blocky transition) -->
    <rect x="110" y="180" width="40" height="20" fill="#6B5132" />
    <rect x="100" y="150" width="20" height="30" fill="#6B5132" />
    
    <!-- Flat Savannah Leaves (Darkest) -->
    <rect x="40" y="130" width="160" height="20" fill="#5A822C" /> 
    <!-- Middle Leaves -->
    <rect x="60" y="110" width="120" height="20" fill="#6B9636" /> 
    <!-- Top Leaves (Lightest) -->
    <rect x="90" y="95" width="60" height="15" fill="#7AA841" />
  </g>

  <!-- 2. THE BIG STONE (Back Layer) -->
  <rect x="230" y="230" width="90" height="50" fill="#696969" /> 
  <rect x="215" y="260" width="15" height="20" fill="#5A5A5A" />

  <!-- 3. THE DIAMOND SWORD (Glow Applied) -->
  <g transform="translate(275, 210) rotate(180)">
    <rect x="0" y="0" width="6" height="12" fill="#5C4033" /> 
    <rect x="-6" y="-4" width="18" height="6" fill="#724924" /> 
    <!-- The Blade now uses the bladeGlow gradient -->
    <rect x="0" y="-40" width="6" height="36" fill="url(#bladeGlow)" stroke="#33E3EC" stroke-width="1" /> 
  </g>

  <!-- 4. THE BIG STONE (Front Layer) -->
  <rect x="245" y="235" width="60" height="45" fill="#808080" /> 
  <rect x="290" y="220" width="25" height="15" fill="#808080" /> 
  <rect x="305" y="250" width="20" height="30" fill="#808080" />

  <!-- 5. MICRO-JITTER CRUST (Savannah Palette) -->
  <rect x="0" y="280" width="400" height="20" fill="#BFB755" /> 
  <rect x="0" y="300" width="400" height="60" fill="#8B5A2B" /> 
  
  <!-- Soil Jitters (Direct) -->
  <rect x="40" y="310" width="3" height="3" fill="#50351A" />
  <rect x="280" y="340" width="3" height="3" fill="#724924" />

  <!-- GRASS CRUST JITTERS -->
  <g class="crust-jitters">
    <!-- Dry Grass patches -->
    <rect x="30" y="280" width="10" height="4" fill="#A89F43" />
    <rect x="120" y="280" width="15" height="2" fill="#A89F43" />
    <rect x="250" y="280" width="8" height="5" fill="#A89F43" />
    <rect x="360" y="280" width="12" height="3" fill="#A89F43" />
    
    <!-- Light Grass patches -->
    <rect x="70" y="280" width="6" height="3" fill="#D1CB7C" />
    <rect x="190" y="280" width="10" height="2" fill="#D1CB7C" />
    <rect x="310" y="280" width="4" height="4" fill="#D1CB7C" />
  </g>

  <!-- DIRT CRUST JITTERS -->
  <g class="soil-jitters">
    <!-- Deep Soil (Darker) -->
    <rect x="60" y="320" width="4" height="4" fill="#50351A" />
    <rect x="140" y="340" width="6" height="3" fill="#50351A" />
    <rect x="220" y="315" width="3" height="6" fill="#50351A" />
    <rect x="350" y="330" width="5" height="5" fill="#50351A" />
    
    <!-- Coarse Sand/Rocks (Lighter) -->
    <rect x="90" y="310" width="3" height="3" fill="#A07850" />
    <rect x="180" y="345" width="4" height="2" fill="#A07850" />
    <rect x="290" y="305" width="2" height="2" fill="#A07850" />
  </g>


<!-- TREE DETAIL JITTERS -->
<g transform="translate(-65, 0)" class="tree-detail-jitters">
  <!-- Bark Texture -->
  <rect x="135" y="210" width="4" height="8" fill="#4D3A24" />
  <rect x="105" y="160" width="6" height="4" fill="#4D3A24" />
  
  <!-- Leaf Density Jitters -->
  <rect x="50" y="135" width="8" height="8" fill="#4B6B25" />
  <rect x="160" y="132" width="12" height="6" fill="#4B6B25" />
  <rect x="110" y="105" width="6" height="6" fill="#8FB852" />
</g>


<!-- STONE CRUST JITTERS -->
<g class="stone-surface-jitters">
  <rect x="255" y="245" width="4" height="4" fill="#696969" />
  <rect x="280" y="265" width="10" height="2" fill="#696969" />
  <rect x="295" y="230" width="3" height="3" fill="#A9A9A9" />
  
  <!-- Edge Jitters -->
  <rect x="230" y="278" width="12" height="4" fill="#5A5A5A" />
  <rect x="320" y="278" width="8" height="3" fill="#5A5A5A" />
</g>

<!-- TALL DRY GRASS (Replaces Poppy) -->
<g class="flower-poppy" transform="translate(45, 260)">
  <rect x="2" y="5" width="2" height="15" fill="#A89F43" />
  <rect x="0" y="10" width="2" height="10" fill="#A89F43" />
  <rect x="4" y="12" width="2" height="8" fill="#A89F43" />
</g>


<!-- DEAD BUSH (Replaces Dandelion) -->
<g class="flower-dandelion" transform="translate(180, 270)">
  <rect x="3" y="6" width="2" height="4" fill="#724924" />
  <rect x="1" y="4" width="6" height="2" fill="#724924" />
  <rect x="0" y="2" width="2" height="4" fill="#724924" />
  <rect x="6" y="2" width="2" height="4" fill="#724924" />
</g>

<!-- BLUE ORCHID (Faded for Savannah) -->
<g class="flower-orchid" transform="translate(320, 262)">
  <rect x="3" y="8" width="2" height="10" fill="#5A822C" /> 
  <rect x="0" y="4" width="4" height="4" fill="#5BCED3" /> 
  <rect x="4" y="0" width="4" height="4" fill="#D0F0F2" /> 
</g>

</svg>

